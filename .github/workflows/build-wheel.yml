name: build-wheel

# Compiling the HIP extension needs only the ROCm toolchain (hipcc + hipCUB +
# rocThrust), NOT an AMD GPU — so this builds on a standard GitHub-hosted runner
# inside a rocm/pytorch container. The rocm/pytorch image is large (~30 GB+), so
# we free disk space BEFORE pulling it (a job-level `container:` would pull before
# any cleanup step could run and hit "no space left on device").

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:
    inputs:
      rocm_image:
        description: 'ROCm PyTorch image to build inside'
        default: 'rocm/pytorch:latest'
      arches:
        description: 'PYTORCH_ROCM_ARCH (semicolon-separated gfx targets)'
        default: 'gfx1100;gfx1101;gfx1102;gfx1151;gfx1200;gfx1201'

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - name: Free up disk space for the ROCm image
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false

      - uses: actions/checkout@v4

      - name: Build + verify wheel in ROCm container
        env:
          ROCM_IMAGE: ${{ github.event.inputs.rocm_image || 'rocm/pytorch:latest' }}
          ARCHES: ${{ github.event.inputs.arches || 'gfx1100;gfx1101;gfx1102;gfx1151;gfx1200;gfx1201' }}
        run: |
          docker run --rm -v "$PWD":/src -w /src \
            -e PYTORCH_ROCM_ARCH="$ARCHES" \
            -e CUDA_HOME=/opt/rocm -e ROCM_HOME=/opt/rocm -e MAX_JOBS=4 \
            "$ROCM_IMAGE" bash -lc '
              set -e
              python -c "import torch; print(\"torch\", torch.__version__, \"hip\", torch.version.hip)"
              echo "PYTORCH_ROCM_ARCH=$PYTORCH_ROCM_ARCH"
              pip wheel . --no-build-isolation -w dist
              pip install --no-deps dist/*.whl
              python -c "import simple_knn._C as C; print(\"simple_knn._C OK:\", C)"
              ls -la dist/
            '

      - uses: actions/upload-artifact@v4
        with:
          name: simple_knn-rocm-wheel
          path: dist/*.whl
          if-no-files-found: error

      - name: Attach wheel to release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
