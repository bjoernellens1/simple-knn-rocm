name: build-wheel

# Compiling the HIP extension needs only the ROCm toolchain (hipcc + hipCUB +
# rocThrust), NOT an AMD GPU — so this runs on a standard GitHub-hosted runner
# inside a rocm/pytorch container. The produced wheel embeds code objects for the
# requested gfx arch(es) and can be installed on a matching ROCm host.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:
    inputs:
      rocm_image:
        description: 'ROCm PyTorch base image to build inside'
        default: 'rocm/pytorch:latest'
      arches:
        description: 'PYTORCH_ROCM_ARCH (semicolon-separated gfx targets)'
        default: 'gfx1100;gfx1101;gfx1102;gfx1151;gfx1200;gfx1201'

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    container:
      image: ${{ github.event.inputs.rocm_image || 'rocm/pytorch:latest' }}
    env:
      PYTORCH_ROCM_ARCH: ${{ github.event.inputs.arches || 'gfx1100;gfx1101;gfx1102;gfx1151;gfx1200;gfx1201' }}
      CUDA_HOME: /opt/rocm
      ROCM_HOME: /opt/rocm
      MAX_JOBS: '4'
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain info
        run: |
          python -c "import torch; print('torch', torch.__version__, 'hip', torch.version.hip)"
          hipconfig --version || true
          echo "PYTORCH_ROCM_ARCH=$PYTORCH_ROCM_ARCH"

      - name: Build wheel
        run: |
          pip wheel . --no-build-isolation -w dist
          ls -la dist/

      - name: Verify the extension imports (CPU import check)
        run: |
          pip install --no-deps dist/*.whl
          python -c "import simple_knn._C as C; print('simple_knn._C OK:', C)"

      - uses: actions/upload-artifact@v4
        with:
          name: simple_knn-rocm-wheel
          path: dist/*.whl
          if-no-files-found: error

      - name: Attach wheel to release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
